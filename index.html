<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>居民档案 - 星露谷风格</title>
</head>
<body>
    <div class="main-container">
        <div class="infobox">
            <div class="infobox-header">某某 (Your Name)</div>
            <div class="infobox-image">
                <img src="portrait.png" alt="人物肖像">
            </div>
            <p><b>生日：</b> 冬季 15 日</p>
            <p><b>住址：</b> 鹈鹕镇 1 号</p>
            <p><b>最爱：</b> 咖啡、披萨</p>
        </div>

        <h1>档案：某某</h1>
        <p>“这是一个关于你在星露谷世界里的小传记。你可以写下你的背景故事。”</p>

        <h2>礼物喜好</h2>
        <table class="gift-table">
            <tr class="gift-row">
                <td class="gift-header">最爱</td>
                <td><img src="gift1.png" class="gift-icon"> 咖啡 (Coffee)</td>
            </tr>
            <tr class="gift-row">
                <td class="gift-header">喜欢</td>
                <td><img src="gift2.png" class="gift-icon"> 太阳精华 (Solar Essence)</td>
            </tr>
        </table>
    </div>
</body>
</html>
